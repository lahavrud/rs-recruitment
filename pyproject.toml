[tool.ruff]
line-length = 88

[tool.ruff.lint]
# E = pycodestyle errors
# F = Pyflakes
# I = isort
select = ["E", "F", "I"]

ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning:jose.*",
]
# Allow session-scoped async fixtures in test_admin.py
asyncio_fixtures = [
    "tests/api/test_admin.py::admin_user:session",
    "tests/api/test_admin.py::client:session",
]
