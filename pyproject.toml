[tool.ruff]
line-length = 88

[tool.ruff.lint]
# E = pycodestyle errors
# F = Pyflakes
# I = isort
select = ["E", "F", "I"]

ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
# --durations=20 surfaces the 20 slowest tests in every run. Free diagnostic
# signal; used to validate future runtime-optimization work in the suite.
addopts = "--durations=20"
filterwarnings = [
    "ignore::DeprecationWarning:jose.*",
]

[dependency-groups]
dev = [
    "aiosmtpd>=1.4.6",
    "pymupdf>=1.27.2.3",
]
