[tool.ruff]
line-length = 88

[tool.ruff.lint]
# E = pycodestyle errors
# F = Pyflakes
# I = isort
select = ["E", "F", "I"]

ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning:jose.*",
    "ignore::DeprecationWarning:pytest_asyncio.*",
    "ignore::pytest.PytestConfigWarning:pytest.*",
]

[dependency-groups]
dev = [
    "aiosmtpd>=1.4.6",
    "pymupdf>=1.27.2.3",
]
