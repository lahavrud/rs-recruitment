server_tokens off;

# Real client IP from CloudFront.
# SG restricts port 80 to CloudFront IPs only, so all X-Forwarded-For is trustworthy.
set_real_ip_from 0.0.0.0/0;
real_ip_header  X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80 default_server;
    server_name _;

    # Docker's embedded DNS resolver — re-resolves api:8000 after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_host api:8000;

    location /api/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_redirect     http:// https://;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /auth/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_redirect     http:// https://;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location = /robots.txt {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location = /sitemap.xml {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
