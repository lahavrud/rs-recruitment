name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (leave blank to redeploy CURRENT_SHA)"
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Build backend image ────────────────────────────────────────────────────

  build-backend:
    name: Build & push backend image
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - id: meta
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Check if backend image already in ECR
        id: backend_exists
        run: |
          if aws ecr describe-images \
            --repository-name rs-recruiting/api \
            --image-ids imageTag=${{ github.event.workflow_run.head_sha }} \
            --region us-east-1 > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> Image already exists — skipping build"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        if: steps.backend_exists.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/rs-recruiting/api:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Build & deploy frontend to S3 + CloudFront ────────────────────────────

  deploy-frontend:
    name: Build & deploy frontend
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RELEASE: ${{ github.event.workflow_run.head_sha }}
          VITE_GTM_ID: GTM-PRRX7D6L

      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          # index.html — no-cache so browsers always fetch the latest bundle references
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          # All other assets — lifecycle rule expires stale bundles after 3 days
          aws s3 sync frontend/dist/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"

  # ── Deploy backend to EC2 ─────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, deploy-frontend]
    if: |
      always() && (
        (github.event_name == 'workflow_run' && needs.build-backend.result == 'success' && needs.deploy-frontend.result == 'success') ||
        (github.event_name == 'workflow_dispatch')
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve SHA to deploy
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_SHA="${{ github.event.inputs.sha }}"
            if [ -n "${INPUT_SHA}" ]; then
              echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
            else
              CURRENT=$(aws ssm get-parameter \
                --name /rs-recruiting/infra/CURRENT_SHA \
                --query 'Parameter.Value' --output text)
              echo "sha=${CURRENT}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SHA-pinned artifacts to S3
        if: github.event_name == 'workflow_run'
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruiting-deploy-prod-${ACCOUNT_ID}"
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/${SHA}/docker-compose.deploy.yml"
          aws s3 cp scripts/deploy_ec2.sh     "s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh"
          aws s3 cp nginx/nginx.conf          "s3://${S3_BUCKET}/deploy/${SHA}/nginx.conf"
          aws s3 cp alloy/config.alloy        "s3://${S3_BUCKET}/deploy/${SHA}/alloy/config.alloy"

      - name: Trigger deploy via SSM Run Command
        id: ssm
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruiting-deploy-prod-${ACCOUNT_ID}"
          DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh /tmp/deploy_${SHA}.sh && IMAGE_TAG=${SHA} bash /tmp/deploy_${SHA}.sh"
          PARAMS=$(jq -n --arg cmd "$DEPLOY_CMD" '{commands: [$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.COMMAND_ID }}"
          for i in $(seq 1 54); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[${i}/54] ${STATUS}"
            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "==> Timed out waiting for deploy (9 min)"
          exit 1

  # ── Failure notification ──────────────────────────────────────────────────

  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: [build-backend, deploy-frontend, deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          [ -z "${SHA}" ] && SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ROLLBACK_URL="https://github.com/${{ github.repository }}/actions/workflows/rollback.yml"
          printf '%s\n\n%s\n\n%s\n' \
            "**Deploy failed** for commit [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})." \
            "Check the [workflow run](${RUN_URL}) for current production state and logs." \
            "To redeploy a previous version: [run the rollback workflow](${ROLLBACK_URL})." \
            > /tmp/issue_body.md
          gh issue create \
            --title "Deploy failed: ${SHORT_SHA}" \
            --body-file /tmp/issue_body.md \
            --repo "${{ github.repository }}"
