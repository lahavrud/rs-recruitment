name: Rollback Production

# Redeploy a previous image that is already in ECR.
# By default deploys PREV_SHA (the version running before the most recent
# deploy). You can also specify any SHA that has been deployed before.
#
# WARNING — PREV_SHA footgun: after a successful rollback, deploy_ec2.sh sets
# PREV_SHA = the bad version it just replaced. Clicking "Rollback" a second
# time would redeploy the bad SHA. Always read the "Resolving rollback SHA"
# step output to confirm what is about to be deployed before acting.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA to deploy (must exist in ECR — leave blank to use PREV_SHA)"
        required: false

# Share the deploy lock so this never races an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    name: Roll back production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve rollback SHA
        id: sha
        run: |
          INPUT_SHA="${{ github.event.inputs.sha }}"
          CURRENT=$(aws ssm get-parameter \
            --name /rs-recruitment/infra/CURRENT_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          PREV=$(aws ssm get-parameter \
            --name /rs-recruitment/infra/PREV_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          echo "==> CURRENT_SHA (running now): ${CURRENT:-<none>}"
          echo "==> PREV_SHA    (last deploy):  ${PREV:-<none>}"

          if [ -n "${INPUT_SHA}" ]; then
            echo "==> Using specified SHA: ${INPUT_SHA}"
            echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
          elif [ -n "${PREV}" ]; then
            echo "==> Using PREV_SHA: ${PREV}"
            echo "==> NOTE: if you previously ran a rollback, PREV_SHA may be a bad version."
            echo "==>       Check the SHA above. To deploy a specific version, re-run with an explicit SHA."
            echo "sha=${PREV}" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: PREV_SHA is not set and no SHA was provided. Cannot roll back."
            exit 1
          fi

      - name: Trigger rollback via SSM Run Command
        id: ssm
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruiting-deploy-prod-${ACCOUNT_ID}"
          DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh /tmp/deploy_${SHA}.sh && IMAGE_TAG=${SHA} bash /tmp/deploy_${SHA}.sh"
          PARAMS=$(jq -n --arg cmd "$DEPLOY_CMD" '{commands: [$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "==> SSM command ID: ${COMMAND_ID}"

      # 54 * 10s = 9 min ceiling, matching deploy.yml
      - name: Wait for rollback to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.COMMAND_ID }}"
          echo "==> Polling SSM command ${COMMAND_ID}..."
          for i in $(seq 1 54); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[${i}/54] ${STATUS}"
            case "${STATUS}" in
              Success)
                echo "==> Rollback succeeded"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "==> Rollback failed"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "==> Timed out waiting for rollback (9 min)"
          exit 1

  notify-failure:
    name: Notify rollback failure
    runs-on: ubuntu-latest
    needs: [rollback]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          printf '%s\n\n%s\n' \
            "**Rollback workflow failed.** Production state is uncertain." \
            "Check the [workflow run](${RUN_URL}) for logs, then inspect the EC2 instance directly." \
            > /tmp/issue_body.md
          gh issue create \
            --title "Rollback failed — manual intervention required" \
            --body-file /tmp/issue_body.md \
            --repo "${{ github.repository }}"
