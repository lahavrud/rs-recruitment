name: Stale issues

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      # Pin to a SHA hash once a stable version is confirmed, matching repo policy.
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been inactive for 60 days and is marked stale.
            It will close in 14 days unless there is further activity.
            Remove the `stale` label or add a comment to keep it open.
          close-issue-message: >
            Closing after 74 days of inactivity. Reopen if still relevant.
          stale-issue-label: stale
          # Never auto-close: critical issues, security findings, and iceboxed items
          exempt-issue-labels: 'P1,security,icebox'
          operations-per-run: 100
