name: CI Pipeline

# Cancel in-flight runs when a new commit lands on the same branch.
# Saves Actions minutes on rapid push cycles (typo fixes, force-pushes, etc.).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"

jobs:
  # Compute which areas of the repo changed in this PR so downstream jobs
  # can skip when irrelevant. GitHub Actions bills per-job rounded up to
  # the minute, so skipping a 4-second job saves a full billed minute.
  #
  # On push-to-main (or any non-PR event) every flag is forced to 'true'
  # so the deploy gate runs the full suite.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.diff.outputs.backend }}
      frontend: ${{ steps.diff.outputs.frontend }}
      deploy: ${{ steps.diff.outputs.deploy }}
      docker: ${{ steps.diff.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "backend=true"
              echo "frontend=true"
              echo "deploy=true"
              echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE" "$HEAD")
          match() { grep -qE "$1" <<<"$FILES"; }

          backend=false; frontend=false; deploy=false; docker=false

          # Workflow edits invalidate every assumption — run everything.
          if match '^\.github/workflows/'; then
            backend=true; frontend=true; deploy=true; docker=true
          fi
          if match '^(src/|tests/|scripts/.*\.py|requirements\.txt|pyproject\.toml|uv\.lock)'; then
            backend=true
          fi
          if match '^frontend/'; then
            frontend=true
          fi
          if match '^(Dockerfile|frontend/Dockerfile|docker-compose.*\.yml|scripts/deploy_ec2\.sh|scripts/validate_deploy_artifacts\.sh)'; then
            deploy=true
          fi
          if match '^(Dockerfile|frontend/Dockerfile|requirements\.txt|pyproject\.toml|frontend/package(-lock)?\.json|docker-compose.*\.yml|scripts/deploy_ec2\.sh|src/main\.py)'; then
            docker=true
            # docker-build smoke-tests the backend image, so guard it with
            # the same checks the image depends on.
            backend=true
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "deploy=$deploy"
            echo "docker=$docker"
          } >> "$GITHUB_OUTPUT"

  # Combined ruff + structural validation. Previously split as `lint` plus a
  # 5-way `validate` matrix — the matrix paid a 1-minute billing floor per
  # shard for ~8 seconds of real work each. CVE auditing moved to the
  # weekly security-audit workflow.
  backend-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: validate_imports
        run: python scripts/validate_imports.py

      - name: check_file_sizes
        run: python scripts/check_file_sizes.py

      - name: validate_type_hints
        run: python scripts/validate_type_hints.py

      - name: validate_blocking_io
        run: python scripts/validate_blocking_io.py

      - name: validate_test_files
        run: python scripts/validate_test_files.py

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rs_recruitment_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/rs_recruitment_test" # pragma: allowlist secret
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Tests
        # -n auto: pytest-xdist creates one worker per CPU. tests/conftest.py
        # provisions a per-worker DB so the autouse table.delete() cleanup
        # does not race across workers.
        run: uv run pytest -n auto --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  frontend-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc -b --noEmit

  validate-deploy-artifacts:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy == 'true'
    name: Validate deploy artifacts (HTTPS contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: bash scripts/validate_deploy_artifacts.sh

  docker-build:
    runs-on: ubuntu-latest
    # Skip on push to main (deploy job builds), on draft PRs, and when no
    # Docker-relevant files changed (see detect-changes job above).
    needs: [detect-changes, backend-checks, test]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.detect-changes.outputs.docker == 'true'
    env:
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      PG_TEST_PASSWORD: "test" # pragma: allowlist secret
      TEST_DB_URL: "postgresql+asyncpg://test:test@test-db:5432/rs_recruitment_test" # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rs-recruitment:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Start test network and postgres
        run: |
          docker network create test-net
          docker run -d --name test-db --network test-net \
            -e POSTGRES_DB=rs_recruitment_test \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD="$PG_TEST_PASSWORD" \
            postgres:16-alpine
          docker run -d --name test-redis --network test-net redis:7-alpine
          for i in {1..10}; do
            docker exec test-db pg_isready -U test && break || sleep 2
          done

      - name: Start container
        run: |
          docker run -d \
            --name rs-recruitment-test \
            --network test-net \
            -p 8000:8000 \
            -e DATABASE_URL="$TEST_DB_URL" \
            -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            -e REDIS_URL="redis://test-redis:6379/0" \
            rs-recruitment:test

      - name: Wait for service to be ready
        run: |
          # Wait for health endpoint with smart retry (max ~8s total)
          for i in {1..8}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              exit 0
            fi
            # Start with quick checks, then longer waits
            sleep $((i <= 3 ? 1 : 2))
          done
          echo "❌ Service failed to start"
          docker logs rs-recruitment-test
          docker ps -a
          exit 1

      - name: Verify health endpoint
        run: |
          # Use curl to get the response
          response=$(curl -s http://localhost:8000/health)

          # Use python3 to safely parse the JSON and verify the fields
          # This avoids fragile string comparisons and shell syntax errors
          echo "$response" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              assert data['status'] == 'ok', f'Unexpected status: {data.get(\"status\")}'
              assert data['environment'] == 'development', f'Unexpected env: {data.get(\"environment\")}'
              print('✅ Health endpoint verified')
          except Exception as e:
              print(f'❌ Verification failed: {e}')
              sys.exit(1)
          "

      - name: Cleanup
        if: always()
        run: |
          docker stop rs-recruitment-test || true
          docker rm rs-recruitment-test || true
          docker stop test-db || true
          docker rm test-db || true
          docker stop test-redis || true
          docker rm test-redis || true
          docker network rm test-net || true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-checks, test, frontend-lint, validate-deploy-artifacts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write # Required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/rs-recruitment/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/rs-recruitment/frontend:${{ github.sha }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_RELEASE=${{ github.sha }}
          secrets: | # pragma: allowlist secret
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate deploy artifacts (HTTPS contract)
        run: bash scripts/validate_deploy_artifacts.sh

      - name: Upload SHA-pinned artifacts to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          SHA="${{ github.sha }}"
          # Per-SHA prefix is immutable — never overwrite a previous deploy's artifacts
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/${SHA}/docker-compose.deploy.yml"
          aws s3 cp scripts/deploy_ec2.sh "s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh"

      - name: Save current SHA as rollback target
        run: |
          CURRENT=$(aws ssm get-parameter \
            --name /rs-recruitment/infra/CURRENT_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [[ -n "${CURRENT}" ]]; then
            aws ssm put-parameter \
              --name /rs-recruitment/infra/PREV_SHA \
              --value "${CURRENT}" \
              --type String --overwrite
          fi

      - name: Trigger deploy via SSM Run Command
        id: ssm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          SHA="${{ github.sha }}"
          DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh /tmp/deploy_${SHA}.sh && IMAGE_TAG=${SHA} bash /tmp/deploy_${SHA}.sh"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "commands=[\"${DEPLOY_CMD}\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM command ID: ${COMMAND_ID}"

      - name: Wait for deploy to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.COMMAND_ID }}"
          echo "Waiting for SSM command ${COMMAND_ID}..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[${i}/30] Status: ${STATUS}"
            case "${STATUS}" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "Deploy failed with status: ${STATUS}"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for deploy (5 min)"
          exit 1

      - name: Publish CURRENT_SHA to SSM
        run: |
          aws ssm put-parameter \
            --name /rs-recruitment/infra/CURRENT_SHA \
            --value "${{ github.sha }}" \
            --type String --overwrite

      - name: Prune old S3 deploy artifacts (keep last 10, protect current + prev)
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"

          CURRENT_SHA=$(aws ssm get-parameter \
            --name /rs-recruitment/infra/CURRENT_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          PREV_SHA=$(aws ssm get-parameter \
            --name /rs-recruitment/infra/PREV_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          # List all deploy/ prefixes sorted newest-first by LastModified
          ALL=$(aws s3api list-objects-v2 \
            --bucket "$S3_BUCKET" \
            --prefix "deploy/" \
            --delimiter "/" \
            --query "sort_by(CommonPrefixes, &Prefix)[] | reverse(@) | [].Prefix" \
            --output text | tr '\t' '\n' | sed 's|deploy/||;s|/||')

          COUNT=0
          for SHA in $ALL; do
            COUNT=$((COUNT + 1))
            if [[ $COUNT -le 10 ]]; then
              echo "Keeping deploy/$SHA (rank $COUNT)"
              continue
            fi
            # Never delete the rollback targets regardless of age rank
            if [[ "$SHA" == "$CURRENT_SHA" || "$SHA" == "$PREV_SHA" ]]; then
              echo "Keeping deploy/$SHA (protected rollback target)"
              continue
            fi
            echo "Deleting deploy/$SHA (rank $COUNT)"
            aws s3 rm "s3://${S3_BUCKET}/deploy/${SHA}/" --recursive
          done
