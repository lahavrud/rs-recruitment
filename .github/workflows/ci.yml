name: CI Pipeline

# Cancel in-flight runs only for PRs — saves Actions minutes on rapid push
# cycles (typo fixes, force-pushes). For pushes to main, we never cancel:
# GitHub-side cancellation does NOT stop an in-flight SSM Run-Command on
# the prod EC2, so cancelling a deploy in CI would just race a second SSM
# command against the first on the same instance.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # Compute which areas of the repo changed in this PR so downstream jobs
  # can skip when irrelevant. GitHub Actions bills per-job rounded up to
  # the minute, so skipping a 4-second job saves a full billed minute.
  #
  # On push-to-main (or any non-PR event) every flag is forced to 'true'
  # so the deploy gate runs the full suite.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.diff.outputs.backend }}
      frontend: ${{ steps.diff.outputs.frontend }}
      deploy: ${{ steps.diff.outputs.deploy }}
      docker: ${{ steps.diff.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "backend=true"
              echo "frontend=true"
              echo "deploy=true"
              echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE" "$HEAD")
          match() { grep -qE "$1" <<<"$FILES"; }

          backend=false; frontend=false; deploy=false; docker=false

          # Workflow edits invalidate every assumption — run everything.
          if match '^\.github/workflows/'; then
            backend=true; frontend=true; deploy=true; docker=true
          fi
          if match '^(src/|tests/|scripts/.*\.py|pyproject\.toml|uv\.lock)'; then
            backend=true
          fi
          if match '^frontend/'; then
            frontend=true
          fi
          if match '^(Dockerfile|frontend/Dockerfile|docker-compose.*\.yml|scripts/deploy_ec2\.sh|scripts/validate_deploy_artifacts\.sh)'; then
            deploy=true
          fi
          if match '^(Dockerfile|frontend/Dockerfile|pyproject\.toml|uv\.lock|frontend/package(-lock)?\.json|docker-compose.*\.yml|scripts/deploy_ec2\.sh|src/main\.py)'; then
            docker=true
            # docker-build smoke-tests the backend image, so guard it with
            # the same checks the image depends on.
            backend=true
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "deploy=$deploy"
            echo "docker=$docker"
          } >> "$GITHUB_OUTPUT"

  # Combined ruff + structural validation. Previously split as `lint` plus a
  # 5-way `validate` matrix — the matrix paid a 1-minute billing floor per
  # shard for ~8 seconds of real work each. CVE auditing moved to the
  # weekly security-audit workflow.
  backend-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: validate_imports
        run: uv run python scripts/validate_imports.py

      - name: check_file_sizes
        run: uv run python scripts/check_file_sizes.py

      - name: validate_type_hints
        run: uv run python scripts/validate_type_hints.py

      - name: validate_blocking_io
        run: uv run python scripts/validate_blocking_io.py

      - name: validate_test_files
        run: uv run python scripts/validate_test_files.py

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rs_recruitment_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/rs_recruitment_test" # pragma: allowlist secret
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run Tests
        # -n auto: pytest-xdist creates one worker per CPU. tests/conftest.py
        # provisions a per-worker DB so the autouse table.delete() cleanup
        # does not race across workers.
        run: uv run pytest -n auto --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  frontend-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc -b --noEmit

  validate-deploy-artifacts:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy == 'true'
    name: Validate deploy artifacts (HTTPS contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: bash scripts/validate_deploy_artifacts.sh

  docker-build:
    runs-on: ubuntu-latest
    # Skip on push to main (deploy job builds), on draft PRs, and when no
    # Docker-relevant files changed (see detect-changes job above).
    needs: [detect-changes, backend-checks, test]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.detect-changes.outputs.docker == 'true'
    env:
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      PG_TEST_PASSWORD: "test" # pragma: allowlist secret
      TEST_DB_URL: "postgresql+asyncpg://test:test@test-db:5432/rs_recruitment_test" # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          tags: rs-recruitment:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Start test network and postgres
        run: |
          docker network create test-net
          docker run -d --name test-db --network test-net \
            -e POSTGRES_DB=rs_recruitment_test \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD="$PG_TEST_PASSWORD" \
            postgres:16-alpine
          docker run -d --name test-redis --network test-net redis:7-alpine
          for i in {1..10}; do
            docker exec test-db pg_isready -U test && break || sleep 2
          done

      - name: Start container
        run: |
          docker run -d \
            --name rs-recruitment-test \
            --network test-net \
            -p 8000:8000 \
            -e DATABASE_URL="$TEST_DB_URL" \
            -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            -e REDIS_URL="redis://test-redis:6379/0" \
            rs-recruitment:test

      - name: Wait for service to be ready
        run: |
          # Wait for health endpoint with smart retry (max ~8s total)
          for i in {1..8}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              exit 0
            fi
            # Start with quick checks, then longer waits
            sleep $((i <= 3 ? 1 : 2))
          done
          echo "❌ Service failed to start"
          docker logs rs-recruitment-test
          docker ps -a
          exit 1

      - name: Verify health endpoint
        run: |
          # Use curl to get the response
          response=$(curl -s http://localhost:8000/health)

          # Use python3 to safely parse the JSON and verify the fields
          # This avoids fragile string comparisons and shell syntax errors
          echo "$response" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              assert data['status'] == 'ok', f'Unexpected status: {data.get(\"status\")}'
              assert data['environment'] == 'development', f'Unexpected env: {data.get(\"environment\")}'
              print('✅ Health endpoint verified')
          except Exception as e:
              print(f'❌ Verification failed: {e}')
              sys.exit(1)
          "

      - name: Cleanup
        if: always()
        run: |
          docker stop rs-recruitment-test || true
          docker rm rs-recruitment-test || true
          docker stop test-db || true
          docker rm test-db || true
          docker stop test-redis || true
          docker rm test-redis || true
          docker network rm test-net || true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-checks, test, frontend-lint, validate-deploy-artifacts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write # Required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/rs-recruitment/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: frontend
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/rs-recruitment/frontend:${{ github.sha }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_RELEASE=${{ github.sha }}
            VITE_GTM_ID=GTM-PRRX7D6L
          secrets: | # pragma: allowlist secret
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Upload SHA-pinned artifacts to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          SHA="${{ github.sha }}"
          # Per-SHA prefix is immutable — never overwrite a previous deploy's artifacts.
          # Retention is handled by an S3 bucket lifecycle rule, not by CI.
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/${SHA}/docker-compose.deploy.yml"
          aws s3 cp scripts/deploy_ec2.sh "s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh"

      - name: Trigger deploy via SSM Run Command
        id: ssm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          SHA="${{ github.sha }}"
          DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/${SHA}/deploy_ec2.sh /tmp/deploy_${SHA}.sh && IMAGE_TAG=${SHA} bash /tmp/deploy_${SHA}.sh"
          PARAMS=$(jq -n --arg cmd "$DEPLOY_CMD" '{commands: [$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM command ID: ${COMMAND_ID}"

      # deploy_ec2.sh owns CURRENT_SHA/PREV_SHA. CI does not mutate SSM
      # parameters — keeps the OIDC role minimal and avoids two writers
      # racing over the same state.
      # 45 * 10s = 7.5 min ceiling. The new flow runs migrations as a
      # `run --rm` container (full container-start cycle) before `up -d`, so a
      # cold ECR pull + migrate + service start can crowd the previous 5-min
      # budget. SSM-side execution is unbounded; only CI's perception is
      # capped here. Bump if you start seeing TimedOut on healthy deploys.
      - name: Wait for deploy to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.COMMAND_ID }}"
          echo "Waiting for SSM command ${COMMAND_ID}..."
          for i in $(seq 1 45); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[${i}/45] Status: ${STATUS}"
            case "${STATUS}" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "Deploy failed with status: ${STATUS}"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for deploy (7.5 min)"
          exit 1

  # Single required-check gate. Replacing 5 individual required checks with
  # this job means docs-only PRs (where all real jobs are skipped via
  # detect-changes) still satisfy branch protection — skipped needs count as
  # passing here. Required checks in the branch ruleset: ["CI Gate"] only.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [backend-checks, test, frontend-lint, validate-deploy-artifacts, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed or were skipped
        run: |
          echo '${{ toJSON(needs) }}' | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [name for name, data in needs.items() if data['result'] not in ('success', 'skipped')]
          if failed:
              print('Failed jobs:', failed)
              sys.exit(1)
          print('All required jobs passed or were skipped.')
          "
