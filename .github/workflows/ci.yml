name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster checkout

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Ruff Linter
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Validate imports (SOC enforcement)
        run: python scripts/validate_imports.py

      - name: Check file sizes
        run: python scripts/check_file_sizes.py

      - name: Validate type hints
        run: python scripts/validate_type_hints.py

      - name: Validate blocking I/O in async functions
        run: python scripts/validate_blocking_io.py

      - name: Validate test file existence
        run: python scripts/validate_test_files.py

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rs_recruitment_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/rs_recruitment_test" # pragma: allowlist secret
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster checkout

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Tests
        # Sequential: all workers share one PostgreSQL DB; -n auto would cause
        # cross-worker cleanup conflicts (table.delete() wipes all rows).
        run: uv run pytest

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc -b

  validate-deploy-artifacts:
    name: Validate deploy artifacts (HTTPS contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: bash scripts/validate_deploy_artifacts.sh

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # On push to main the deploy job handles building
    needs: [lint, test, frontend-lint] # Only run if lint, test, and frontend type check pass
    env:
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      PG_TEST_PASSWORD: "test" # pragma: allowlist secret
      TEST_DB_URL: "postgresql+asyncpg://test:test@test-db:5432/rs_recruitment_test" # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rs-recruitment:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Start test network and postgres
        run: |
          docker network create test-net
          docker run -d --name test-db --network test-net \
            -e POSTGRES_DB=rs_recruitment_test \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD="$PG_TEST_PASSWORD" \
            postgres:16-alpine
          for i in {1..10}; do
            docker exec test-db pg_isready -U test && break || sleep 2
          done

      - name: Start container
        run: |
          docker run -d \
            --name rs-recruitment-test \
            --network test-net \
            -p 8000:8000 \
            -e DATABASE_URL="$TEST_DB_URL" \
            -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            rs-recruitment:test

      - name: Wait for service to be ready
        run: |
          # Wait for health endpoint with smart retry (max ~8s total)
          for i in {1..8}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              exit 0
            fi
            # Start with quick checks, then longer waits
            sleep $((i <= 3 ? 1 : 2))
          done
          echo "❌ Service failed to start"
          docker logs rs-recruitment-test
          docker ps -a
          exit 1

      - name: Verify health endpoint
        run: |
          # Use curl to get the response
          response=$(curl -s http://localhost:8000/health)

          # Use python3 to safely parse the JSON and verify the fields
          # This avoids fragile string comparisons and shell syntax errors
          echo "$response" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              assert data['status'] == 'ok', f'Unexpected status: {data.get(\"status\")}'
              assert data['environment'] == 'development', f'Unexpected env: {data.get(\"environment\")}'
              print('✅ Health endpoint verified')
          except Exception as e:
              print(f'❌ Verification failed: {e}')
              sys.exit(1)
          "

      - name: Cleanup
        if: always()
        run: |
          docker stop rs-recruitment-test || true
          docker rm rs-recruitment-test || true
          docker stop test-db || true
          docker rm test-db || true
          docker network rm test-net || true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-lint, validate-deploy-artifacts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write # Required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/rs-recruitment/api:latest
            ${{ secrets.ECR_REGISTRY }}/rs-recruitment/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Validate deploy artifacts (HTTPS contract)
        run: bash scripts/validate_deploy_artifacts.sh

      - name: Upload artifacts to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          # Force-copy index.html — sync skips same-size files even when content changes
          aws s3 cp frontend/dist/index.html "s3://${S3_BUCKET}/deploy/dist/index.html"
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/deploy/dist/" --delete --exclude "index.html"
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/docker-compose.deploy.yml"
          aws s3 cp frontend/nginx.conf "s3://${S3_BUCKET}/deploy/nginx.conf"
          aws s3 cp scripts/deploy_ec2.sh "s3://${S3_BUCKET}/deploy/deploy_ec2.sh"

      - name: Trigger deploy via SSM Run Command
        id: ssm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruitment-${ACCOUNT_ID}"
          DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/deploy_ec2.sh /tmp/deploy_ec2.sh && bash /tmp/deploy_ec2.sh"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "commands=[\"${DEPLOY_CMD}\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "COMMAND_ID=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM command ID: ${COMMAND_ID}"

      - name: Wait for deploy to complete
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.COMMAND_ID }}"
          echo "Waiting for SSM command ${COMMAND_ID}..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[${i}/30] Status: ${STATUS}"
            case "${STATUS}" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                echo "Deploy failed with status: ${STATUS}"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for deploy (5 min)"
          exit 1
