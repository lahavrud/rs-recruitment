name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run Ruff Linter
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run Tests
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long"
      DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with docker-compose (cached)
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for service to be ready
        run: |
          # Wait for health endpoint to respond (retry up to 15 times)
          for i in {1..15}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              exit 0
            fi
            if [ $i -eq 15 ]; then
              echo "❌ Service failed to start"
              docker compose logs
              docker compose ps
              exit 1
            fi
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          # Verify health endpoint returns correct response
          response=$(curl -s http://localhost:8000/health)
          if [ "$response" != '{"status":"ok"}' ]; then
            echo "❌ Health endpoint returned: $response (expected: {\"status\":\"ok\"})"
            exit 1
          fi
          echo "✅ Health endpoint verified"

      - name: Cleanup
        if: always()
        run: docker compose down -v