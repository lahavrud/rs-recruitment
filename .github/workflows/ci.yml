name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"  # Cache pip packages

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Ruff Linter
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"  # Cache pip packages

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Tests
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]  # Only run if lint and test pass
    env:
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long"
      DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rs-recruitment:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Start container
        run: |
          docker run -d \
            --name rs-recruitment-test \
            -p 8000:8000 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            rs-recruitment:test

      - name: Wait for service to be ready
        run: |
          # Wait for health endpoint with smart retry (max ~8s total)
          for i in {1..8}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Service is ready"
              exit 0
            fi
            # Start with quick checks, then longer waits
            sleep $((i <= 3 ? 1 : 2))
          done
          echo "❌ Service failed to start"
          docker logs rs-recruitment-test
          docker ps -a
          exit 1

      - name: Verify health endpoint
        run: |
          response=$(curl -s http://localhost:8000/health)
          if [ "$response" != '{"status":"ok"}' ]; then
            echo "❌ Health endpoint returned: $response (expected: {\"status\":\"ok\"})"
            exit 1
          fi
          echo "✅ Health endpoint verified"

      - name: Cleanup
        if: always()
        run: |
          docker stop rs-recruitment-test || true
          docker rm rs-recruitment-test || true