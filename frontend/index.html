<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Fonts: preconnect lets the TLS handshake start in parallel with the HTML
         parse so the @font-face fetch doesn't wait for the stylesheet. Moving
         the stylesheet out of `@import` in index.css unblocks render — when
         it's inside CSS the browser must download our CSS *first*, parse it,
         then fetch the font CSS. As a <link> they're requested in parallel. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font load via the preload-swap pattern: `rel="preload" as="style"`
         downloads the stylesheet without blocking render; onload swaps the rel
         to "stylesheet" to apply it. More reliable than the `media="print"`
         trick in Firefox, where media=print can defer @font-face fetches and
         leave the page in fallback fonts indefinitely. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" />
    </noscript>

    <!-- LCP preload: matches the static <picture class="page-hero-bg"> below.
         Keeps the responsive srcset hint so the browser can pick the right
         WebP variant before the <source> element is parsed. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      imagesrcset="/hero-city-768.webp 768w, /hero-city.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <!-- Static fallback meta — must match what SeoHead renders for `/` so
         Google sees consistent content whether or not it executes JS.
         Brand goes at the end (single occurrence) to avoid Google's title
         rewriter appending it again and producing "RS Recruiting — X — RS Recruiting". -->
    <title>גיוס לתפקידי ניהול ותפעול מבנים ונכסים — RS Recruiting</title>
    <meta name="description" content="משרד גיוס והשמה בוטיקי המתמחה בגיוס לתפקידי ניהול ותפעול מבנים ונכסים. חיפוש עבודה עם ליווי אישי ושיבוץ מדויק." />
    <meta property="og:site_name" content="RS Recruiting" />
    <meta property="og:title" content="גיוס לתפקידי ניהול ותפעול מבנים ונכסים — RS Recruiting" />
    <meta property="og:description" content="משרד גיוס והשמה בוטיקי המתמחה בגיוס לתפקידי ניהול ותפעול מבנים ונכסים. חיפוש עבודה עם ליווי אישי ושיבוץ מדויק." />
    <meta property="og:image" content="/hero-city.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="he_IL" />

    <!-- Initial paint (LCP): static city image + static LogoBanner. Both
         render at HTML-parse time so the LCP candidate is no longer the
         React-rendered SVG logo waiting on hydration (was 6.3 s on mobile).
         - .page-hero-bg: the city image as a fixed background. Stays at
           opacity:0 until the browser fires `load`, then fades to 1 over
           500 ms — clean reveal, hides any progressive WebP decode.
         - .initial-banner: replicates the LogoBanner JSX (logo SVG +
           "RS Recruiting" wordmark) inside #root so the SVG paints
           immediately. Dimensions match the React version so there's no
           shift when createRoot wipes the placeholder on mount. Inline
           styles avoid waiting on the Tailwind CSS bundle. -->
    <style>
      html { background: #0D0B09; }
      body { background: transparent; margin: 0; }
      .page-hero-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 60%;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 600ms ease-out;
      }
      .page-hero-bg.is-loaded { opacity: 1; }

      .initial-banner {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding-bottom: 4rem;
        z-index: 1;
      }
      .initial-logo { width: 7rem; height: 7rem; flex-shrink: 0; }
      .initial-wordmark {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 300;
        font-size: 3.75rem;
        letter-spacing: 0.1em;
        line-height: 1;
        color: rgba(201, 168, 76, 0.6);
      }
      @media (min-width: 640px) {
        .initial-banner { flex-direction: row; gap: 0; padding-bottom: 6rem; }
        .initial-logo { width: 6rem; height: 6rem; }
        .initial-wordmark { margin-inline-start: 2rem; }
      }
      @media (min-width: 1024px) {
        .initial-wordmark { font-size: 4.5rem; }
      }
    </style>
  </head>
  <body>
    <picture>
      <source
        type="image/webp"
        srcset="/hero-city-768.webp 768w, /hero-city.webp 1920w"
        sizes="100vw"
      />
      <!-- decoding="async" (default) lets the browser paint the element at
           opacity:0 *before* the image is decoded — that initial frame is
           what the transition needs to start from. With decoding="sync"
           the first paint waited for decode, by which time onload had
           already added .is-loaded → no transition. Double rAF in onload
           also ensures the browser commits a frame at opacity:0 before
           we flip to opacity:1, so the transition reliably plays even
           when the image is cached and `load` fires synchronously.
           Partial WebP decode is invisible anyway since the element
           starts at opacity:0. -->
      <img
        class="page-hero-bg"
        src="/hero-city.jpg"
        alt=""
        fetchpriority="high"
        decoding="async"
        onload="requestAnimationFrame(() => requestAnimationFrame(() => this.classList.add('is-loaded')))"
      />
    </picture>
    <div id="root">
      <div class="initial-banner" role="presentation">
        <img class="initial-logo" src="/logo.svg" alt="RS Recruiting" width="112" height="112" />
        <span class="initial-wordmark">RS Recruiting</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
