<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="אודות RS Recruiting — מי אנחנו">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0B09"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B87333" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="200" width="1200" height="430" fill="url(#glow)"/>

  <!-- Bottom accent -->
  <rect x="0" y="540" width="1200" height="1" fill="#B87333" fill-opacity="0.4"/>

  <!-- Copper vertical bar -->
  <rect x="80" y="140" width="3" height="350" fill="#B87333" fill-opacity="0.6"/>

  <!-- Large watermark RS -->
  <text x="650" y="500" font-family="Georgia, serif" font-size="380" font-weight="300" fill="#B87333" fill-opacity="0.04" letter-spacing="-10">RS</text>

  <!-- Value boxes -->
  <rect x="740" y="180" width="160" height="80" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="920" y="180" width="160" height="80" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="740" y="278" width="160" height="80" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="920" y="278" width="160" height="80" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.2" stroke-width="1"/>

  <text x="820" y="216" font-family="Georgia, serif" font-size="30" fill="#B87333" fill-opacity="0.7" text-anchor="middle">01</text>
  <text x="820" y="240" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">מקצוענות</text>
  <text x="1000" y="216" font-family="Georgia, serif" font-size="30" fill="#B87333" fill-opacity="0.7" text-anchor="middle">02</text>
  <text x="1000" y="240" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">יחס אישי</text>
  <text x="820" y="314" font-family="Georgia, serif" font-size="30" fill="#B87333" fill-opacity="0.7" text-anchor="middle">03</text>
  <text x="820" y="338" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">מהירות</text>
  <text x="1000" y="314" font-family="Georgia, serif" font-size="30" fill="#B87333" fill-opacity="0.7" text-anchor="middle">04</text>
  <text x="1000" y="338" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">שקיפות</text>

  <!-- Eyebrow -->
  <text x="112" y="218" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#B87333" fill-opacity="0.9" letter-spacing="4">אודות</text>

  <!-- Rule -->
  <rect x="112" y="232" width="100" height="1" fill="#B87333" fill-opacity="0.5"/>

  <!-- Headline -->
  <text x="112" y="300" font-family="Arial, sans-serif" font-size="50" font-weight="300" fill="#ffffff" fill-opacity="0.85">מי אנחנו</text>

  <!-- Sub -->
  <text x="112" y="360" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="#ffffff" fill-opacity="0.4">משרד גיוס בוטיקי —</text>
  <text x="112" y="394" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="#ffffff" fill-opacity="0.4">מומחים בניהול ותפעול מבנים ונכסים</text>

  <!-- Brand -->
  <text x="112" y="480" font-family="Georgia, serif" font-size="18" fill="#C9A84C" fill-opacity="0.6" letter-spacing="4">RS RECRUITING</text>
</svg>
