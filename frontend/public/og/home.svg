<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="RS Recruiting — גיוס מדויק, יחס אישי">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0B09"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#B87333" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Copper horizon accent -->
  <rect x="0" y="540" width="1200" height="1" fill="#B87333" fill-opacity="0.4"/>

  <!-- Copper side bar -->
  <rect x="80" y="140" width="3" height="350" fill="#B87333" fill-opacity="0.6"/>

  <!-- Wordmark: RS -->
  <text x="112" y="300" font-family="Georgia, serif" font-size="160" font-weight="300" fill="#B87333" fill-opacity="0.12" letter-spacing="-4">RS</text>

  <!-- Brand name -->
  <text x="112" y="238" font-family="Georgia, serif" font-size="52" font-weight="300" fill="#C9A84C" letter-spacing="8">RS RECRUITING</text>

  <!-- Divider rule -->
  <rect x="112" y="262" width="200" height="1" fill="#B87333" fill-opacity="0.5"/>

  <!-- Tagline -->
  <text x="112" y="310" font-family="Arial, sans-serif" font-size="34" font-weight="300" fill="#ffffff" fill-opacity="0.75">גיוס מדויק, יחס אישי</text>

  <!-- Sub-tagline -->
  <text x="112" y="360" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="#ffffff" fill-opacity="0.4">גיוס והשמה לתפקידי ניהול ותפעול מבנים ונכסים</text>

  <!-- Domain -->
  <text x="112" y="430" font-family="Arial, sans-serif" font-size="18" fill="#B87333" fill-opacity="0.7" letter-spacing="2">rs-recruiting.com</text>

  <!-- Decorative building silhouettes -->
  <g fill="#1A1816" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <rect x="900" y="280" width="80" height="350"/>
    <rect x="1000" y="240" width="65" height="390"/>
    <rect x="1080" y="310" width="90" height="320"/>
    <rect x="1000" y="190" width="45" height="440"/>
    <rect x="850" y="330" width="50" height="300"/>
  </g>
  <!-- Lit windows -->
  <g fill="#B87333" fill-opacity="0.45">
    <rect x="915" y="310" width="10" height="10"/>
    <rect x="935" y="350" width="10" height="10"/>
    <rect x="915" y="390" width="10" height="10"/>
    <rect x="1015" y="270" width="10" height="10"/>
    <rect x="1035" y="320" width="10" height="10"/>
    <rect x="1015" y="370" width="10" height="10"/>
    <rect x="1095" y="340" width="10" height="10"/>
    <rect x="1115" y="390" width="10" height="10"/>
    <rect x="1012" y="210" width="10" height="10"/>
    <rect x="1030" y="250" width="10" height="10"/>
  </g>
</svg>
