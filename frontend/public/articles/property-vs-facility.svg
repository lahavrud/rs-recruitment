<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="השוואה בין ניהול נכסים לניהול מבנים">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0B09"/>
      <stop offset="55%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </linearGradient>
    <linearGradient id="glow-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B87333" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#sky)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#glow-l)"/>
  <rect x="800" y="0" width="800" height="600" fill="url(#glow-r)"/>

  <!-- Center divider -->
  <rect x="798" y="60" width="2" height="480" fill="#B87333" fill-opacity="0.3"/>

  <!-- Horizon line -->
  <line x1="0" y1="540" x2="1600" y2="540" stroke="#B87333" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Left panel — Property Manager (business/documents) -->
  <rect x="120" y="160" width="520" height="280" rx="10" fill="#1A1816" fill-opacity="0.5" stroke="#B87333" stroke-opacity="0.15" stroke-width="1"/>
  <!-- document lines -->
  <rect x="160" y="200" width="200" height="12" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="160" y="224" width="280" height="8" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="160" y="244" width="240" height="8" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="160" y="264" width="260" height="8" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <!-- signature line -->
  <rect x="160" y="340" width="180" height="1" fill="#B87333" fill-opacity="0.4"/>
  <text x="160" y="360" font-family="Arial, sans-serif" font-size="11" fill="#B87333" fill-opacity="0.5">חתימה</text>
  <!-- coin icon -->
  <circle cx="530" cy="280" r="50" fill="none" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="2"/>
  <text x="530" y="290" font-family="Georgia, serif" font-size="32" fill="#C9A84C" fill-opacity="0.35" text-anchor="middle">₪</text>

  <text x="390" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#B87333" fill-opacity="0.8" letter-spacing="3" text-anchor="middle">PROPERTY MANAGER</text>
  <text x="390" y="490" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" fill-opacity="0.45" text-anchor="middle">חוזים · שוכרים · הכנסות</text>

  <!-- Right panel — Facility Manager (technical/building) -->
  <rect x="960" y="160" width="520" height="280" rx="10" fill="#1A1816" fill-opacity="0.5" stroke="#B87333" stroke-opacity="0.15" stroke-width="1"/>
  <!-- gear icon -->
  <circle cx="1080" cy="270" r="45" fill="none" stroke="#B87333" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="1080" cy="270" r="20" fill="none" stroke="#B87333" stroke-opacity="0.25" stroke-width="2"/>
  <!-- building outline -->
  <rect x="1280" y="200" width="160" height="220" fill="none" stroke="#B87333" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="1290" y="215" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>
  <rect x="1340" y="215" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>
  <rect x="1390" y="215" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>
  <rect x="1290" y="265" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>
  <rect x="1340" y="265" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>
  <rect x="1390" y="265" width="30" height="30" fill="#B87333" fill-opacity="0.12"/>

  <text x="1210" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#B87333" fill-opacity="0.8" letter-spacing="3" text-anchor="middle">FACILITY MANAGER</text>
  <text x="1210" y="490" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" fill-opacity="0.45" text-anchor="middle">תחזוקה · מערכות · תפעול</text>

  <!-- VS label at center -->
  <text x="800" y="310" font-family="Georgia, serif" font-size="48" font-weight="300" fill="#B87333" fill-opacity="0.5" text-anchor="middle">VS</text>
</svg>
