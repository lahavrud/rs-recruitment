<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="מסלול קריירה בניהול נכסים — שלבים עולים">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0B09"/>
      <stop offset="55%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#B87333" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#sky)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect width="1600" height="600" fill="url(#glow)"/>

  <!-- Horizon line -->
  <line x1="0" y1="540" x2="1600" y2="540" stroke="#B87333" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Career ladder — 4 ascending steps -->
  <!-- Step 1 (entry) -->
  <rect x="120" y="440" width="260" height="100" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="120" y="440" width="4" height="100" rx="2" fill="#B87333" fill-opacity="0.5"/>
  <text x="145" y="472" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#B87333" fill-opacity="0.8" letter-spacing="2">שלב 1</text>
  <text x="145" y="494" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.75">תפקיד כניסה</text>
  <text x="145" y="515" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.35">1–3 שנים</text>

  <!-- Arrow 1→2 -->
  <path d="M 395 490 L 440 490 L 440 420 L 480 420" fill="none" stroke="#B87333" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="480,415 490,420 480,425" fill="#B87333" fill-opacity="0.35"/>

  <!-- Step 2 -->
  <rect x="490" y="360" width="260" height="100" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="490" y="360" width="4" height="100" rx="2" fill="#B87333" fill-opacity="0.6"/>
  <text x="515" y="392" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#B87333" fill-opacity="0.8" letter-spacing="2">שלב 2</text>
  <text x="515" y="414" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.8">מנהל מבנה</text>
  <text x="515" y="435" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.35">3–7 שנים</text>

  <!-- Arrow 2→3 -->
  <path d="M 765 410 L 810 410 L 810 340 L 850 340" fill="none" stroke="#B87333" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="850,335 860,340 850,345" fill="#B87333" fill-opacity="0.35"/>

  <!-- Step 3 -->
  <rect x="860" y="270" width="280" height="100" rx="6" fill="#1A1816" stroke="#B87333" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="860" y="270" width="4" height="100" rx="2" fill="#B87333" fill-opacity="0.7"/>
  <text x="885" y="302" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#B87333" fill-opacity="0.8" letter-spacing="2">שלב 3</text>
  <text x="885" y="324" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.85">מנהל פורטפוליו</text>
  <text x="885" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.35">5–10 שנים</text>

  <!-- Arrow 3→4 -->
  <path d="M 1155 320 L 1200 320 L 1200 220 L 1240 220" fill="none" stroke="#C9A84C" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="1240,215 1250,220 1240,225" fill="#C9A84C" fill-opacity="0.4"/>

  <!-- Step 4 (senior) — gold accent -->
  <rect x="1250" y="160" width="300" height="100" rx="6" fill="#1A1816" stroke="#C9A84C" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="1250" y="160" width="4" height="100" rx="2" fill="#C9A84C" fill-opacity="0.7"/>
  <text x="1275" y="192" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#C9A84C" fill-opacity="0.9" letter-spacing="2">שלב 4</text>
  <text x="1275" y="214" font-family="Arial, sans-serif" font-size="16" fill="#C9A84C" fill-opacity="0.85">VP Operations / COO</text>
  <text x="1275" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.35">10+ שנים</text>

  <!-- Watermark -->
  <text x="800" y="580" font-family="Georgia, serif" font-size="14" fill="#B87333" fill-opacity="0.2" text-anchor="middle" letter-spacing="4">RS RECRUITING</text>
</svg>
