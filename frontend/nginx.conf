# Trust real client IP from Cloudflare (CF-Connecting-IP header)
# Updated periodically; sync from cloudflare.com/ips-v4 if CF changes ranges.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# ── Bot UA matcher ────────────────────────────────────────────────────────
# Two categories of non-rendering clients we need to prerender for:
#   1. Social-preview scrapers — don't execute JS, only need <head> metadata
#      for link previews.
#   2. Search-engine crawlers — Googlebot *can* render JS but the second-stage
#      queue is slow/unreliable; serving pre-rendered HTML gets us indexed
#      faster and more completely with the same JSON-LD.
# Real browsers fall through to the SPA. Per Google's "dynamic rendering"
# docs, this is allowed as long as the content matches what users see.
# `map` must be at http context, so it lives outside the server blocks.
map $http_user_agent $is_prerender_bot {
    default                                                                                                                       0;
    "~*Googlebot|Googlebot-Mobile|Googlebot-Image|Bingbot|DuckDuckBot|YandexBot|Baiduspider|AhrefsBot|SemrushBot"                  1;
    "~*facebookexternalhit|LinkedInBot|WhatsApp|Twitterbot|Slackbot|Discordbot|TelegramBot|Pinterest|redditbot|Embedly|Skype|vkShare|W3C_Validator|Applebot" 1;
}

# Reject any request whose Host header isn't ours — direct origin-IP probes get 444.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs-recruiting.com www.rs-recruiting.com;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers at server-block level are inherited by all proxy locations
    # (/api/, /auth/, /health, /robots.txt, /sitemap.xml) which define no add_header
    # of their own. HTML-serving locations below override these via their own add_header
    # directives, so they re-declare all headers through nginx_security_headers.conf.
    include /etc/nginx/security_headers.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver — re-resolve upstream hostnames every 10s
    # so nginx picks up the new IP when the api container is recreated on deploy
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Host-only variable so proxy_pass triggers per-request DNS resolution.
    # NOTE: proxy_pass with a variable disables nginx's URI path transformation,
    # so we forward the path explicitly. Use $uri$is_args$args (not
    # $request_uri) so internal `rewrite ... last` lands at the rewritten
    # target — $request_uri keeps the original client URI and would route
    # bot prerender rewrites (/, /jobs) back to "/" inside FastAPI → 404.
    set $api_host api:8000;

    # Hashed static assets — cache aggressively (filename changes on every build)
    location /assets/ {
        expires 1y;
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block source maps from being served — they expose full TypeScript source.
    location ~* \.map$ {
        return 404;
    }

    # React SPA — never cache index.html so browsers always get the latest bundle references.
    # `rewrite ... last` is one of the two operations nginx documents as safe to
    # use inside `if` (the other is `return`). It avoids the well-known
    # "if + proxy_pass" antipattern. Bot UA matching is done by the $is_prerender_bot
    # map declared at the http context above.
    location = / {
        if ($is_prerender_bot) { rewrite ^ /api/og/home last; }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location = /jobs {
        if ($is_prerender_bot) { rewrite ^ /api/og/jobs last; }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location = /about {
        if ($is_prerender_bot) { rewrite ^ /api/og/about last; }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location = /contact {
        if ($is_prerender_bot) { rewrite ^ /api/og/contact last; }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location / {
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/articles/[a-z0-9-]+$ {
        if ($is_prerender_bot) {
            rewrite ^/articles/([a-z0-9-]+)$ /api/og/articles/$1 last;
        }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    location ~ ^/jobs/\d+$ {
        if ($is_prerender_bot) {
            rewrite ^/jobs/(\d+)$ /api/og/jobs/$1 last;
        }
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        # Rewrite http:// Location headers from FastAPI's trailing-slash redirect
        # to https:// before they reach the client.
        proxy_redirect     http:// https://;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # SEO endpoints served by the API. Exact-match `=` so these win over
    # the `location /` SPA fallback that would otherwise return index.html.
    location = /robots.txt {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location = /sitemap.xml {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /auth/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_redirect     http:// https://;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
