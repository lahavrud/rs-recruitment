# Security headers — included by every location block that defines its own add_header
# directives. nginx's inheritance rule drops parent-level add_header entries the moment
# a child block adds any header of its own, so each such block must re-declare them here.
# Proxy locations (/api/, /auth/, etc.) have no add_header and inherit these from the
# server block directly; they do NOT include this file.

# HSTS: 1-year max-age with subdomains. preload flag queues the domain for browser
# preload lists (submit separately at hstspreload.org once confirmed stable).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

add_header X-Content-Type-Options  "nosniff" always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

# frame-ancestors 'none' in the CSP is the modern equivalent of X-Frame-Options DENY.
# Both are kept for older browser compatibility.
add_header X-Frame-Options         "DENY" always;
add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;

# CSP: 'unsafe-inline' on script-src is required by the GTM inline snippet injected
# at build time (vite.config.ts gtmPlugin). It limits loading to known origins but
# cannot prevent inline script execution. A nonce-based policy is a follow-up task.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.sentry.io; frame-src https://www.googletagmanager.com; frame-ancestors 'none'" always;
