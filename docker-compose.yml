version: '3.8'

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: rs-recruitment-mailpit
    ports:
      - "1025:1025"   # SMTP — app sends here
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rs-recruitment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rs-recruitment-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/rs_recruitment.db}
      # WARNING: JWT_SECRET_KEY must be set to a secure value (min 32 chars)
      # Generate with: python -c 'import secrets; print(secrets.token_urlsafe(32))'
      # If not set, validation will fail at startup (by design for security)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # CORS Configuration: Comma-separated list of allowed origins
      # Example: ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      # Hardcoded to Docker service name — .env value (localhost) must not override this
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      # Set TESTING=true to disable rate limiting in local dev
      - TESTING=${TESTING:-false}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      # Optional: Set APP_UID and APP_GID to match your host user's UID/GID
      # This ensures proper permissions when using bind mounts
      # Example: args: { APP_UID: "1000", APP_GID: "1000" }
    container_name: rs-recruitment-worker
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/rs_recruitment.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      # Hardcoded to Docker service name — .env value (localhost) must not override this
      - REDIS_URL=redis://redis:6379/0
      # Email — routes to the Mailpit container; view at http://localhost:8025
      - EMAIL_PROVIDER=smtp
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@rsrecruit.local}
      - SMTP_USE_TLS=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: ["arq", "src.core.tasks.WorkerSettings"]
    restart: unless-stopped

volumes:
  redis-data:
