version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: rs-recruiting-db
    environment:
      POSTGRES_DB: rs_recruitment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: rs-recruiting-mailpit
    ports:
      - "1025:1025"   # SMTP — app sends here
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rs-recruiting-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/rs_recruitment}
      # WARNING: JWT_SECRET_KEY must be set to a secure value (min 32 chars)
      # Generate with: python -c 'import secrets; print(secrets.token_urlsafe(32))'
      # If not set, validation will fail at startup (by design for security)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10}
      # CORS Configuration: Comma-separated list of allowed origins
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      # SQS_QUEUE_URL is intentionally absent — tasks run inline in local dev
      # Set TESTING=true to disable rate limiting in local dev
      - TESTING=${TESTING:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Worker is only needed in production (SQS). In local dev tasks run inline
  # inside the API process (SQS_QUEUE_URL is unset). To run the worker locally
  # point SQS_QUEUE_URL at a LocalStack endpoint and uncomment below.
  #
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: rs-recruiting-worker
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/rs_recruitment}
  #     - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
  #     - SQS_QUEUE_URL=${SQS_QUEUE_URL}
  #     - EMAIL_PROVIDER=smtp
  #     - SMTP_HOST=mailpit
  #     - SMTP_PORT=1025
  #     - SMTP_USER=
  #     - SMTP_PASSWORD=
  #     - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@rsrecruit.local}
  #     - SMTP_USE_TLS=false
  #   depends_on:
  #     - db
  #     - mailpit
  #   command: ["python", "-m", "src.worker"]
  #   restart: unless-stopped

volumes:
  postgres-data:
