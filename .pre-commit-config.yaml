# Pre-commit hooks configuration
# Install: uv sync (pre-commit is in the [dev] dependency group)
# Setup: uv run pre-commit install
# Update hooks: uv run pre-commit autoupdate
# Run manually: uv run pre-commit run --all-files

repos:
  # General file checks (fast, should run first)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags (for docker-compose)
      - id: check-added-large-files
        args: [--maxkb=500]  # Warn on files > 500KB
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-json
      - id: check-toml
      - id: check-docstring-first
      - id: debug-statements  # Catch pdb, ipdb, etc.

  # Ruff: Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [--fix]  # Auto-fix issues when possible
      - id: ruff-format

  # Security: Detect secrets and credentials
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            .*\.lock|
            .*\.min\.js|
            alembic/versions/.*|
            README\.md|
            docs/.*
          )$

  # Commit message validation (Conventional Commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

# Configuration for specific hooks
default_language_version:
  python: python3.12

# Exclude patterns (files that should skip pre-commit)
exclude: |
  (?x)^(
    .*\.pyc|
    .*\.pyo|
    .*\.pyd|
    __pycache__|
    \.git|
    \.venv|
    venv/|
    \.pytest_cache|
    \.mypy_cache|
    alembic/versions/.*\.py$  # Exclude migration files from some checks
  )$
