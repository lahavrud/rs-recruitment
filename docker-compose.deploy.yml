# Production deployment compose — EC2 + Cloudflare + RDS
#
# Two SHA-tagged ECR images + one TLS bind mount. Configs and frontend dist
# are baked into the frontend image. The deploy script materializes TLS from
# SSM at runtime (certs never live in an image).
#
# Required env at compose-time (exported by scripts/deploy_ec2.sh):
#   ECR_REGISTRY  — <account>.dkr.ecr.us-east-1.amazonaws.com
#   IMAGE_TAG     — git SHA pinned to the deploy (also written to SSM
#                   /rs-recruitment/infra/CURRENT_SHA on successful deploys)
#
# EC2 IAM role permissions:
#   ssm:GetParameter / GetParameters / GetParametersByPath on /rs-recruitment/*
#   kms:Decrypt via SSM (for SecureString params, uses aws/ssm key)
#   s3:GetObject + s3:PutObject on rs-recruitment-<account-id>
#   ecr:GetAuthorizationToken + ecr:BatchGetImage
#   logs:CreateLogStream + logs:PutLogEvents on /rs-recruitment/* (awslogs driver)
#
# SSM Parameter Store (us-east-1):
#   /rs-recruitment/prod/*       — app config (loaded at startup, see Settings)
#   /rs-recruitment/infra/TLS_CERT, TLS_KEY  — Cloudflare Origin cert (SecureString)
#   /rs-recruitment/infra/CURRENT_SHA        — currently-deployed git SHA (String)
#
# Deploy: scripts/deploy_ec2.sh   Rollback: scripts/rollback.sh <SHA>

services:
  frontend:
    image: ${ECR_REGISTRY}/rs-recruitment/frontend:${IMAGE_TAG}
    ports:
      - "443:443"
    volumes:
      - ./frontend/tls:/etc/nginx/tls:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/nginx
        awslogs-stream: nginx
        tag: "{{.Name}}/{{.ID}}"

  api:
    image: ${ECR_REGISTRY}/rs-recruitment/api:${IMAGE_TAG}
    environment:
      - ENVIRONMENT=production
      - SENTRY_RELEASE=${IMAGE_TAG}
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/api
        awslogs-stream: api
        tag: "{{.Name}}/{{.ID}}"

  worker:
    image: ${ECR_REGISTRY}/rs-recruitment/api:${IMAGE_TAG}
    command: ["arq", "src.core.tasks.WorkerSettings"]
    environment:
      - ENVIRONMENT=production
      - SENTRY_RELEASE=${IMAGE_TAG}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/worker
        awslogs-stream: worker
        tag: "{{.Name}}/{{.ID}}"

  redis:
    image: redis:7-alpine
    # Password is mounted via Docker secrets (tmpfs at /run/secrets/redis_password)
    # so it never appears in `docker inspect` environment.
    # deploy_ec2.sh writes the SSM-fetched value to ./secrets/redis_password before
    # `docker compose up`, so the file always exists when the container starts.
    command: ["sh", "-c", "exec redis-server --requirepass \"$(cat /run/secrets/redis_password)\""]
    secrets:
      - redis_password
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$(cat /run/secrets/redis_password)\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/redis
        awslogs-stream: redis
        tag: "{{.Name}}/{{.ID}}"

volumes:
  app-data:   # persistent storage for local file uploads (/app/data)
  redis-data: # persistent redis data for Arq job queue

secrets:
  redis_password:
    file: ./secrets/redis_password  # written by deploy_ec2.sh before compose up
