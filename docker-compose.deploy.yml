# Manual deployment compose file — EC2 + Cloudflare + RDS
#
# Prerequisites on the EC2 instance before running:
#   1. Export ECR_REGISTRY (done by deploy script, not stored here):
#        export ECR_REGISTRY=$(aws sts get-caller-identity \
#          --query Account --output text).dkr.ecr.us-east-1.amazonaws.com
#
#   2. Ensure the EC2 IAM role (rs-recruitment-app-role) has permissions for:
#        ssm:GetParameter / GetParameters / GetParametersByPath on /rs-recruitment/*
#        kms:Decrypt via SSM (for SecureString params, uses aws/ssm key)
#        s3:GetObject + s3:PutObject on rs-recruitment-<account-id>
#        ecr:GetAuthorizationToken + ecr:BatchGetImage (already set)
#        logs:CreateLogStream + logs:PutLogEvents on /rs-recruitment/* (awslogs driver)
#
#      SSM Parameter Store (us-east-1) — required (SecureString):
#        /rs-recruitment/prod/JWT_SECRET_KEY      — 32+ char random string
#        /rs-recruitment/prod/DATABASE_URL        — postgresql+asyncpg://...
#        /rs-recruitment/prod/SMTP_PASSWORD       — <resend-api-key>
#      SSM Parameter Store (us-east-1) — TLS material (kept under /infra/ so the
#      app's settings loader does not pick them up as Settings fields):
#        /rs-recruitment/infra/TLS_CERT           — Cloudflare Origin Certificate (PEM)
#        /rs-recruitment/infra/TLS_KEY            — Origin Certificate private key (PEM)
#      SSM Parameter Store (us-east-1) — required (String):
#        /rs-recruitment/prod/ALLOWED_ORIGINS     — https://rs-recruiting.com,https://www.rs-recruiting.com
#        /rs-recruitment/prod/EMAIL_PROVIDER      — smtp
#        /rs-recruitment/prod/SMTP_HOST           — smtp.resend.com
#        /rs-recruitment/prod/SMTP_PORT           — 587
#        /rs-recruitment/prod/SMTP_USER           — resend
#        /rs-recruitment/prod/SMTP_FROM_EMAIL     — noreply@rs-recruiting.com
#        /rs-recruitment/prod/REDIS_URL           — redis://redis:6379/0
#        /rs-recruitment/prod/AWS_REGION          — us-east-1
#        /rs-recruitment/prod/AWS_S3_BUCKET_NAME  — rs-recruitment-<account-id>
#        /rs-recruitment/prod/STORAGE_PROVIDER    — s3
#        /rs-recruitment/prod/FRONTEND_BASE_URL   — https://rs-recruiting.com
#
#      The app fetches all config directly from SSM at startup — no .env file needed.
#      Secret rotation = update SSM parameter + redeploy.
#
#   3. Sync frontend build + materialize TLS cert (handled by deploy_ec2.sh).
#
# Deploy:
#   ./scripts/deploy_ec2.sh

services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/tls:/etc/nginx/tls:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/nginx
        awslogs-stream: nginx
        tag: "{{.Name}}/{{.ID}}"

  api:
    image: ${ECR_REGISTRY}/rs-recruitment/api:latest
    environment:
      - ENVIRONMENT=production
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/api
        awslogs-stream: api
        tag: "{{.Name}}/{{.ID}}"

  worker:
    image: ${ECR_REGISTRY}/rs-recruitment/api:latest
    command: ["arq", "src.core.tasks.WorkerSettings"]
    environment:
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/worker
        awslogs-stream: worker
        tag: "{{.Name}}/{{.ID}}"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruitment/redis
        awslogs-stream: redis
        tag: "{{.Name}}/{{.ID}}"

volumes:
  app-data:   # persistent storage for local file uploads (/app/data)
  redis-data: # persistent redis data for Arq job queue
