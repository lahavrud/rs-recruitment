# Production deployment compose — EC2 + CloudFront + RDS
#
# Frontend is served via CloudFront + S3. nginx here is an API-only reverse
# proxy on port 80 (CloudFront terminates HTTPS). Bot/crawler traffic is
# detected at the CloudFront layer (Lambda@Edge) and routed to /api/og/*.
#
# Required env at compose-time (exported by scripts/deploy_ec2.sh):
#   ECR_REGISTRY      — <account>.dkr.ecr.us-east-1.amazonaws.com
#   IMAGE_TAG         — git SHA pinned to the deploy
#   GRAFANA_*         — Grafana Cloud credentials (read from SSM by deploy_ec2.sh)
#
# EC2 IAM role permissions:
#   ssm:GetParameter / GetParametersByPath on /rs-recruiting/*
#   ssm:PutParameter on /rs-recruiting/infra/CURRENT_SHA, PREV_SHA
#   s3:GetObject + s3:PutObject on rs-recruiting-data-*
#   ecr:GetAuthorizationToken + ecr:BatchGetImage
#   logs:CreateLogStream + logs:PutLogEvents on /rs-recruiting/worker (worker only)
#   sqs:SendMessage + sqs:ReceiveMessage + sqs:DeleteMessage on rs-recruiting-tasks
#   cloudwatch:GetMetricData + cloudwatch:ListMetrics (Alloy CloudWatch exporter)
#
# Deploy: scripts/deploy_ec2.sh   Rollback: scripts/rollback.sh <SHA>

services:
  grafana-alloy:
    image: grafana/alloy:v1.5.1
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:4317:4317"
    environment:
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER}
      - GRAFANA_TEMPO_URL=${GRAFANA_TEMPO_URL}
      - GRAFANA_TEMPO_USER=${GRAFANA_TEMPO_USER}
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_PROMETHEUS_USER=${GRAFANA_PROMETHEUS_USER}
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    networks:
      # See the note on the nginx service below — every service on this
      # network gets a pinned address so Docker's dynamic allocator never
      # claims nginx's reserved IP out from under it.
      default:
        ipv4_address: 172.28.0.4
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      # Static IP so the api container can pin it as its sole trusted proxy
      # for X-Forwarded-For (see FORWARDED_ALLOW_IPS below + TRUSTED_PROXY_IPS
      # in SSM) — must stay in sync with both.
      #
      # Every other service on this network ALSO needs a pinned ipv4_address
      # (not just this one): Docker doesn't pre-reserve a service's declared
      # static IP across the stack — it's only claimed when that container
      # actually connects. nginx starts last (depends_on: api healthy), so an
      # unpinned sibling can be dynamically handed *this* address first,
      # and nginx fails to start with "Address already in use".
      default:
        ipv4_address: 172.28.0.2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Logs via json-file (daemon default); Alloy tails this container via docker socket.

  api:
    image: ${ECR_REGISTRY}/rs-recruiting/api:${IMAGE_TAG}
    environment:
      - ENVIRONMENT=production
      - SENTRY_RELEASE=${IMAGE_TAG}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana-alloy:4317
      # Trust nginx's pinned IP (see `networks.default.ipam` + the nginx
      # service above) as the sole source of X-Forwarded-For. Must mirror
      # TRUSTED_PROXY_IPS in SSM (/rs-recruiting/prod/TRUSTED_PROXY_IPS) —
      # see client_ip()'s docstring in core/infrastructure/dependencies.py
      # for why both layers need to agree.
      - FORWARDED_ALLOW_IPS=172.28.0.2
    networks:
      default:
        ipv4_address: 172.28.0.3
    volumes:
      - app-data:/app/data
    depends_on:
      - grafana-alloy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Logs via OTLP (telemetry.py LoggerProvider → Alloy :4317 → Loki).

  worker:
    image: ${ECR_REGISTRY}/rs-recruiting/api:${IMAGE_TAG}
    command: ["python", "-m", "src.worker"]
    environment:
      - ENVIRONMENT=production
      - SENTRY_RELEASE=${IMAGE_TAG}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana-alloy:4317
    networks:
      default:
        ipv4_address: 172.28.0.5
    depends_on:
      - grafana-alloy
    restart: unless-stopped
    logging:
      # Compliance: /rs-recruiting/worker log group with 400d retention.
      # Worker ALSO ships logs to Loki via OTLP (telemetry.py LoggerProvider).
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /rs-recruiting/worker
        awslogs-create-group: "true"
        awslogs-stream: worker
        tag: "{{.Name}}/{{.ID}}"

volumes:
  app-data:

networks:
  # Pinned subnet so container addresses are stable across redeploys/recreations
  # instead of depending on Docker's auto-allocated bridge pool — required for
  # nginx's static IP (172.28.0.2) below to be a reliable trust anchor for XFF.
  # Verify 172.28.0.0/24 doesn't collide with an existing network on the host
  # (`docker network ls` / `docker network inspect`) before the first deploy
  # with this change — Docker refuses to create overlapping subnets.
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
