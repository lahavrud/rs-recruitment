# Manual deployment compose file — EC2 + Cloudflare + RDS
#
# Prerequisites on the EC2 instance before running:
#   1. Export ECR_REGISTRY (done by deploy script, not stored here):
#        export ECR_REGISTRY=$(aws sts get-caller-identity \
#          --query Account --output text).dkr.ecr.us-east-1.amazonaws.com
#
#   2. Ensure the EC2 IAM role (rs-recruitment-app-role) has permissions for:
#        ssm:GetParameter + ssm:GetParameters on /rs-recruitment/prod/*
#        kms:Decrypt via SSM (for SecureString params, uses aws/ssm key)
#        ses:SendEmail + ses:SendRawEmail (replaces IAM user access keys)
#        s3:GetObject + s3:PutObject on rs-recruitment-<account-id>
#        ecr:GetAuthorizationToken + ecr:BatchGetImage (already set)
#
#      Then populate SSM Parameter Store (us-east-1):
#        /rs-recruitment/prod/JWT_SECRET_KEY    (SecureString) — 32+ char random string
#        /rs-recruitment/prod/DATABASE_URL      (SecureString) — postgresql+asyncpg://...
#        /rs-recruitment/prod/ALLOWED_ORIGINS   (String)       — https://rs-recruiting.com,...
#        /rs-recruitment/prod/AWS_SES_FROM_EMAIL (String)      — noreply@<your-domain>
#
#      The deploy script (deploy_ec2.sh) generates .env automatically from SSM.
#      No manual .env file management required — rotation = update SSM + redeploy.
#
#   3. Sync frontend build from S3 to EC2:
#        aws s3 sync s3://<bucket>/deploy/dist/ ~/app/frontend/dist/ --delete
#        aws s3 cp s3://<bucket>/deploy/dist/index.html ~/app/frontend/dist/index.html
#        aws s3 cp s3://<bucket>/deploy/nginx.conf ~/app/frontend/nginx.conf
#      NOTE: always use `aws s3 cp` for index.html in addition to sync —
#      sync skips it when file size is unchanged (hash filenames are always same length).
#
# Deploy:
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
#   docker compose -f docker-compose.deploy.yml exec -T api uv run alembic upgrade head

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${ECR_REGISTRY}/rs-recruitment/api:latest
    env_file: .env
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    image: ${ECR_REGISTRY}/rs-recruitment/api:latest
    command: ["arq", "src.core.tasks.WorkerSettings"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  app-data:   # persistent storage for local file uploads (/app/data)
  redis-data: # persistent redis data for Arq job queue
