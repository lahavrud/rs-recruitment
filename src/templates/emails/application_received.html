{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  מועמדותך התקבלה
</h2>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#E0DCDB;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  שלום {{ candidate_name }},
</p>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#E0DCDB;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  קיבלנו את מועמדותך למשרת <strong>{{ job_title }}</strong>{% if company_name %} ב-<span style="color:#B87333;font-weight:500;">{{ company_name }}</span>{% endif %}.
</p>

<p class="thi"
   style="margin:0;font-size:14px;line-height:1.7;color:#E0DCDB;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  הצוות יבחן את פרטיכם בקרוב. נחזור אליכם עם עדכון.
</p>

<div class="hr" style="border:0;border-top:1px solid #302C28;margin:28px 0;"></div>

<p class="tmi"
   style="margin:0;font-size:12px;line-height:1.6;color:#999693;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  אין צורך לשלוח את המועמדות שוב — הכל אצלנו.
</p>
{% endblock %}
