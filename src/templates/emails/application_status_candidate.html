{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#1C1916;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  {{ heading }}
</h2>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#1C1916;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  שלום {{ candidate_name }},
</p>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#1C1916;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  {{ body_text }}
</p>

<div class="hr" style="border:0;border-top:1px solid #EDE8E2;margin:28px 0;"></div>

<p class="tmi"
   style="margin:0;font-size:12px;line-height:1.6;color:#5C5550;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  מייל זה נשלח בנוגע למועמדותך למשרת <strong>{{ job_title }}</strong>.
</p>
{% endblock %}
