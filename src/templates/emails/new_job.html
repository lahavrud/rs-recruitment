{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  משרה חדשה ממתינה לאישור
</h2>

<div class="hr" style="border:0;border-top:1px solid #302C28;margin:0 0 20px;"></div>

<table cellpadding="0" cellspacing="0" role="presentation" width="100%" style="margin:0 0 28px;">
  <tr>
    <td style="padding:8px 0;border-bottom:1px solid #302C28;">
      <p class="tmi" style="margin:0;font-size:12px;color:#999693;font-family:Arial,sans-serif;">כותרת המשרה</p>
      <p class="thi" style="margin:4px 0 0;font-size:15px;font-weight:600;color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">{{ job_title }}</p>
    </td>
  </tr>
  <tr>
    <td style="padding:8px 0;border-bottom:1px solid #302C28;">
      <p class="tmi" style="margin:0;font-size:12px;color:#999693;font-family:Arial,sans-serif;">חברה</p>
      <p class="thi" style="margin:4px 0 0;font-size:14px;color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
        <span style="color:#B87333;font-weight:500;">{{ company_name }}</span>
      </p>
    </td>
  </tr>
  <tr>
    <td style="padding:8px 0;border-bottom:1px solid #302C28;">
      <p class="tmi" style="margin:0;font-size:12px;color:#999693;font-family:Arial,sans-serif;">מיקום</p>
      <p class="thi" style="margin:4px 0 0;font-size:14px;color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">{{ location }}</p>
    </td>
  </tr>
  <tr>
    <td style="padding:8px 0;">
      <p class="tmi" style="margin:0;font-size:12px;color:#999693;font-family:Arial,sans-serif;">מזהה</p>
      <p class="thi" style="margin:4px 0 0;font-size:14px;color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">#{{ job_id }}</p>
    </td>
  </tr>
</table>

<table cellpadding="0" cellspacing="0" role="presentation">
  <tr>
    <td>
      <a href="{{ admin_url }}" target="_blank"
         style="display:inline-block;background:#B87333;color:#ffffff;
                text-decoration:none;font-family:Arial,sans-serif;
                font-size:13px;font-weight:700;letter-spacing:1px;
                padding:16px 36px;border-radius:4px;">
        מעבר לניהול משרות
      </a>
    </td>
  </tr>
</table>
{% endblock %}
