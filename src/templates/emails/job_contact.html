{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:{{ c_text }};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  פנייה בנוגע למשרה
</h2>

<p class="thi"
   style="margin:0 0 8px;font-size:14px;line-height:1.7;color:{{ c_text }};
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  שלום <span style="color:{{ c_copper }};font-weight:500;">{{ company_name }}</span>,
</p>
<p class="thi"
   style="margin:0 0 20px;font-size:14px;line-height:1.7;color:{{ c_text }};
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  פנייה זו נשלחה בנוגע למשרת <strong>{{ job_title }}</strong>.
</p>

<div class="hr" style="border:0;border-top:1px solid {{ c_border }};margin:0 0 20px;"></div>

{% if admin_note %}
<p class="thi"
   style="margin:0 0 20px;font-size:14px;line-height:1.7;color:{{ c_text }};
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  {{ admin_note }}
</p>
{% endif %}

<div class="hr" style="border:0;border-top:1px solid {{ c_border }};margin:0 0 20px;"></div>

<p class="tmi"
   style="margin:0;font-size:12px;line-height:1.6;color:{{ c_muted }};
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  לשאלות נוספות, אנא פנו לצוות RS Recruiting.
</p>
{% endblock %}
