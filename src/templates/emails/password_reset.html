{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  איפוס סיסמה
</h2>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#E0DCDB;

<p class="tmi"

</p>
<p class="tmi"
   style="margin:0;font-size:12px;line-height:1.6;color:#999693;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
