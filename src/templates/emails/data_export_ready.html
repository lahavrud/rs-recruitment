{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#E0DCDB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  הנתונים שלכם מוכנים להורדה
</h2>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#E0DCDB;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  ייצוא הנתונים האישיים שביקשתם הוכן. הוא מכיל את פרטי הפרופיל שלכם ואת כל ההגשות.
</p>

<table cellpadding="0" cellspacing="0" role="presentation" style="margin:28px 0;">
  <tr>
    <td>
      <a href="{{ download_url }}" target="_blank"
         style="display:inline-block;background:#B87333;color:#ffffff;
                text-decoration:none;font-family:Arial,sans-serif;
                font-size:13px;font-weight:700;letter-spacing:1px;
                padding:16px 36px;border-radius:4px;">
        הורדת הנתונים
      </a>
    </td>
  </tr>
</table>

<div class="hr" style="border:0;border-top:1px solid #302C28;margin:28px 0;"></div>

<p class="tmi"
   style="margin:0;font-size:12px;line-height:1.6;color:#999693;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  הקישור תקף ל-{{ ttl_hours }} שעות בלבד ויפוג לאחר הורדה ראשונה.
</p>
{% endblock %}
