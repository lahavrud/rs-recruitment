{% extends "_base.html" %}

{% block content %}
<h2 class="thi"
    style="margin:0 0 20px;font-size:22px;font-weight:300;line-height:1.3;
           color:#1C1916;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  עדכון בנוגע למשרה
</h2>

<p class="thi"
   style="margin:0 0 14px;font-size:14px;line-height:1.7;color:#1C1916;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  שלום <span style="color:#B87333;font-weight:500;">{{ company_name }}</span>,
</p>

<p class="thi"
   style="margin:0;font-size:14px;line-height:1.7;color:#1C1916;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  יש עדכון בנוגע למשרת <strong>{{ job_title }}</strong>.
  צוות RS Recruiting מטפל בנושא וייצור אתכם קשר בהתאם לצורך.
</p>
{% endblock %}
